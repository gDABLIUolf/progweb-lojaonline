spring:
  config:
    import: optional:file:.env
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/vesteBem}
    username: ${SPRING_DATASOURCE_USERNAME:vesteBem}
    password: ${SPRING_DATASOURCE_PASSWORD:vesteBem}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  devtools:
    restart:
      additional-paths: src/main/java
      exclude: static/**,templates/**,**/*.txt


  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:seu-email@gmail.com}
    password: ${MAIL_PASSWORD:sua-senha-de-app}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true